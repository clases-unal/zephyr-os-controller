# prj.conf — Configuración de Kconfig del proyecto
#
# Si el build falla con "undefined reference to k_xxx" o "CONFIG_XXX not set",
# casi siempre falta una línea aquí. Busca el nombre del CONFIG en:
#   ~/.platformio/packages/framework-zephyr/Kconfig
# o en la documentación de Zephyr para ese subsistema.

# --- Threading ---
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048

# --- FPU (requerido por logf() en ntc_sensor.c) ---
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- Periféricos de hardware ---
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PWM=y
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Display OLED ---
# SSD1306 vía I2C3. Si tu pantalla usa otro controlador (SH1106, etc.),
# reemplaza CONFIG_SSD1306 por el driver correspondiente.
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# Character Framebuffer: API de alto nivel para escribir texto en el display.
CONFIG_CHARACTER_FRAMEBUFFER=y

# Heap real para que cfb_framebuffer_init() pueda reservar el buffer de
# pantalla. Sin esto, la inicialización del framebuffer falla en silencio
# (fue la causa raíz de que la OLED nunca se activara: display_ok quedaba
# hardcodeado en false para esquivar este problema en vez de resolverlo).
CONFIG_HEAP_MEM_POOL_SIZE=2048

# --- CRC (para CRC16 del protocolo UART hacia ESP32) ---
CONFIG_CRC=y

# --- Watchdog ---
CONFIG_WATCHDOG=y

# --- Almacenamiento persistente ---
# NVS retirado deliberadamente: no se estaba usando de verdad (config_state.c
# y telemetry_state.c nunca llamaban a la API real de NVS pese a tener estos
# CONFIG activados) y el usuario decidió no implementarlo por ahora. Queda
# documentado como mejora futura en docs/04-design-decisions.md — si se
# retoma, reactivar aquí: CONFIG_FLASH, CONFIG_FLASH_MAP, CONFIG_NVS,
# CONFIG_SETTINGS.

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# --- Depuración de threads ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

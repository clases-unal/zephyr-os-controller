; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

;===============================================================================================

; platformio.ini — Sistema de Control Térmico de Alta Disponibilidad
;
; Nota: con framework=zephyr, PlatformIO busca automáticamente zephyr/CMakeLists.txt
; y zephyr/prj.conf en esta misma carpeta. No hace falta declarar src_dir; PlatformIO
; usa src/ por convención.

[env:nucleo_l476rg]
platform = ststm32
board = nucleo_l476rg
framework = zephyr

; Velocidad del monitor serial. Ajustar si en discussion.md / 02-firmware-architecture.md
; se fija una baudrate distinta para el UART de depuración (UART hacia ESP32 es un
; periférico aparte, no este monitor).
monitor_speed = 115200
monitor_raw = yes

; Protocolo de carga: la Nucleo-L476RG trae un debug probe ST-Link integrado,
; PlatformIO debería detectarlo automáticamente. Si falla, descomentar:
; upload_protocol = stlink
; debug_tool = stlink